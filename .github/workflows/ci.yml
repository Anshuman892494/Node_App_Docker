name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Docker build images
      run: docker build -t anshuman892494/node-app:latest . 
      # build tag to anshuman892494/node-app and tag it as latest 

    - name: Docker push images into docker hub
      run: docker push anshuman892494/node-app:latest
      # push tag to docker hub